@"
[phases.setup]
nixPkgs = ["php82", "mysql-client", "nodejs-18_x"]

[phases.install]
cmds = ["composer install --no-dev", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan optimize"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=\$PORT"
"@ | Out-File -FilePath nixpacks.toml -Encoding utf8
